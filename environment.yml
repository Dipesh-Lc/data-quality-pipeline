name: dq-pipeline
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # Data 
  - pandas>=2.2
  - numpy>=1.26
  - openpyxl>=3.1
  - scipy>=1.12

  # Database 
  - sqlalchemy>=2.0
  - psycopg2>=2.9

  # HTTP / API 
  - requests>=2.31

  # Config 
  - pyyaml>=6.0
  - python-dotenv>=1.0

  # Visualisation 
  - matplotlib>=3.8
  - seaborn>=0.13

  # Notebooks 
  - jupyter>=1.0
  - ipykernel>=6.0
  - nbformat>=5.0

  # Dev / test 
  - pytest>=8.0
  - pytest-cov>=5.0
  - ruff>=0.4

  # Pip-only packages 
  - pip:
      - jinja2>=3.1

# Quick start:
#   conda env create -f environment.yml
#   conda activate dq-pipeline

