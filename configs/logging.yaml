version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  brief:
    format: "%(levelname)-8s %(message)s"

handlers:
  console:
    class:     logging.StreamHandler
    level:     INFO
    formatter: standard
    stream:    ext://sys.stdout

  file_all:
    class:              logging.handlers.RotatingFileHandler
    level:              DEBUG
    formatter:          standard
    filename:           artifacts/logs/pipeline.log
    maxBytes:           10485760   # 10 MB
    backupCount:        5
    encoding:           utf8

  file_errors:
    class:              logging.handlers.RotatingFileHandler
    level:              ERROR
    formatter:          standard
    filename:           artifacts/logs/errors.log
    maxBytes:           5242880    # 5 MB
    backupCount:        3
    encoding:           utf8

loggers:
  src:
    level:    DEBUG
    handlers: [console, file_all, file_errors]
    propagate: false

root:
  level:    WARNING
  handlers: [console]
